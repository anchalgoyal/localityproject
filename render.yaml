services:
  - type: web
    name: demand-intelligence-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: ./data
      - key: PYTHON_VERSION
        value: 3.11.9
